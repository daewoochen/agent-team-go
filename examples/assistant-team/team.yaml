name: assistant-team
description: Coordinate incoming requests and route them to the right specialists.
models:
  default_model: mock/generalist
  providers:
    mock:
      kind: mock
skills:
  - name: telegram-messenger
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/telegram-messenger
  - name: feishu-messenger
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/feishu-messenger
agents:
  - name: captain
    role: captain
    goal: Receive requests and coordinate specialists.
    model: mock/captain
    max_attempts: 2
    allowed_tools: [route, summarize]
  - name: planner
    role: planner
    goal: Turn requests into structured work items.
    model: mock/planner
    allowed_tools: [plan]
  - name: researcher
    role: researcher
    goal: Pull facts together before a response goes out.
    model: mock/researcher
    max_attempts: 2
    allowed_tools: [research]
channels:
  - kind: cli
    enabled: true
  - kind: telegram
    enabled: false
    token: ""
    allow_from: ["launch-chat"]
  - kind: feishu
    enabled: false
    app_id: ""
    app_secret: ""
    mode: webhook
    allow_from: ["release-room"]
policies:
  allow_external_skill_install: true
  require_approval_for_external_skills: true
  require_approval_for_messages: true
  require_approval_for_git_write: false
budget:
  max_delegations: 6
  max_tokens: 80000
