name: deep-research-team
description: Build a research report with specialist agents and approval-aware outbound delivery.
models:
  default_model: mock/research-default
  providers:
    mock:
      kind: mock
skills:
  - name: research-kit
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/research-kit
  - name: feishu-messenger
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/feishu-messenger
agents:
  - name: captain
    role: captain
    goal: Own research quality, synthesis, and executive summary.
    model: mock/captain
    allowed_tools: [route, summarize]
    required_skills: [research-kit]
  - name: planner
    role: planner
    goal: Break the research request into work items and milestones.
    model: mock/planner
    allowed_tools: [plan]
  - name: researcher
    role: researcher
    goal: Collect evidence and identify missing facts.
    model: mock/researcher
    allowed_tools: [research]
    required_skills: [research-kit]
  - name: reviewer
    role: reviewer
    goal: Check claims, contradictions, and final structure.
    model: mock/reviewer
    allowed_tools: [review]
channels:
  - kind: cli
    enabled: true
  - kind: feishu
    enabled: false
policies:
  allow_external_skill_install: true
  require_approval_for_external_skills: true
  require_approval_for_messages: true
  require_approval_for_git_write: false
budget:
  max_delegations: 10
  max_tokens: 150000
