name: incident-response-team
description: Triage, investigate, and communicate incidents with approval gates.
models:
  default_model: mock/incident-default
  providers:
    mock:
      kind: mock
skills:
  - name: telegram-messenger
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/telegram-messenger
  - name: research-kit
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/research-kit
agents:
  - name: captain
    role: captain
    goal: Coordinate response and keep stakeholders aligned.
    model: mock/captain
    allowed_tools: [route, summarize]
  - name: planner
    role: planner
    goal: Break the incident into investigation tracks.
    model: mock/planner
    allowed_tools: [plan]
  - name: researcher
    role: researcher
    goal: Gather evidence, timelines, and hypotheses.
    model: mock/investigator
    allowed_tools: [research]
    required_skills: [research-kit]
  - name: reviewer
    role: reviewer
    goal: Review communications and confirm mitigations.
    model: mock/reviewer
    allowed_tools: [review]
channels:
  - kind: cli
    enabled: true
  - kind: telegram
    enabled: false
policies:
  allow_external_skill_install: true
  require_approval_for_external_skills: true
  require_approval_for_messages: true
  require_approval_for_git_write: false
budget:
  max_delegations: 12
  max_tokens: 100000
