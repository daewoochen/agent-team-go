name: release-memory-team
description: Reuse recent launch memory so the team can carry forward risks, decisions, and follow-up work across runs.
models:
  default_model: mock/generalist
  providers:
    mock:
      kind: mock
skills:
  - name: github
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/github
  - name: research-kit
    version: ">=0.1.0"
    source:
      type: local
      path: ../../skills/research-kit
agents:
  - name: captain
    role: captain
    goal: Coordinate releases and retain useful launch memory across runs.
    model: mock/captain
    allowed_tools: [route, summarize]
    required_skills: [github]
    delegation_policy:
      max_depth: 2
      allow_peer_delegation: false
      require_artifacts: true
  - name: planner
    role: planner
    goal: Turn the launch request into an execution sequence.
    model: mock/planner
    allowed_tools: [plan]
  - name: researcher
    role: researcher
    goal: Surface unresolved risks from prior launches and the current request.
    model: mock/researcher
    allowed_tools: [research]
    required_skills: [research-kit]
  - name: reviewer
    role: reviewer
    goal: Check readiness, messaging, and rollback posture.
    model: mock/reviewer
    allowed_tools: [review]
channels:
  - kind: cli
    enabled: true
memory:
  backend: file
  path: .agentteam/memory/release-history.json
  max_entries: 8
policies:
  allow_external_skill_install: true
  require_approval_for_external_skills: false
  require_approval_for_messages: false
  require_approval_for_git_write: true
budget:
  max_delegations: 10
  max_tokens: 90000
